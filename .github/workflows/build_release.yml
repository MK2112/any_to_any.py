name: Build Executables

on:
  workflow_dispatch:  # We go manual only

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: AnyToAnyConverter.exe
            artifact_path: dist/AnyToAnyConverter.exe
            artifact_upload_path: dist/AnyToAnyConverter.exe
            asset_name: AnyToAnyConverter-windows.exe
            python_version: '3.11'
          - os: ubuntu-latest
            artifact_name: AnyToAnyConverter
            artifact_path: dist/AnyToAnyConverter
            artifact_upload_path: dist/AnyToAnyConverter
            asset_name: AnyToAnyConverter-linux
            python_version: '3.12'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          cache: 'pip'

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements_gui.txt

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_windows.txt -r requirements_gui.txt

      - name: Pin PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install pyinstaller==6.7.0 pyinstaller-hooks-contrib==2024.6

      - name: Build executable
        run: python gui/build.py

      - name: Smoke test executable (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x "${{ matrix.artifact_path }}"
          "${{ matrix.artifact_path }}" --version

      - name: Smoke test executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "${{ matrix.artifact_path }}" --version

      - name: Validate artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          test -f "${{ matrix.artifact_path }}"
          test -s "${{ matrix.artifact_path }}"
          ls -lh "${{ matrix.artifact_path }}"
          sha256sum "${{ matrix.artifact_path }}"

      - name: Validate artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $path = "${{ matrix.artifact_path }}"
          if (-not (Test-Path $path)) { throw "Missing artifact: $path" }
          $item = Get-Item $path
          if ($item.Length -le 0) { throw "Artifact is empty: $path" }
          $item | Format-List Name,Length,LastWriteTime
          Get-FileHash $path -Algorithm SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_upload_path }}
          retention-days: 30

name: Build Executables

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: AnyToAny.exe
            artifact_path: dist/AnyToAny.exe
            artifact_upload_path: dist/AnyToAny.exe
            asset_name: AnyToAny-windows.exe
            python_version: '3.11'
          - os: ubuntu-latest
            artifact_name: AnyToAny
            artifact_path: dist/AnyToAny
            artifact_upload_path: dist/AnyToAny
            asset_name: AnyToAny-linux
            python_version: '3.12'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          cache: 'pip'

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libegl1

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements_gui.txt

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt -r requirements_gui.txt

      - name: Pin PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install pyinstaller==6.7.0 pyinstaller-hooks-contrib==2024.6

      - name: Build executable
        run: python gui/build.py

      - name: Assert no bundled ffmpeg binary (Linux)
        if: runner.os == 'Linux'
        run: |
          if find dist -type f -iname 'ffmpeg*' | grep -q .; then
            echo 'Unexpected bundled ffmpeg binary found in dist/'
            find dist -type f -iname 'ffmpeg*'
            exit 1
          fi

      - name: Assert no bundled ffmpeg binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $matches = Get-ChildItem -Path dist -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '^ffmpeg' }
          if ($matches) {
            Write-Host 'Unexpected bundled ffmpeg binary found in dist/'
            $matches | Select-Object -ExpandProperty FullName
            throw 'Bundled ffmpeg detected in artifact payload.'
          }

      - name: Integration conversion test (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ci_tmp/in ci_tmp/out
          ffmpeg -y -f lavfi -i sine=frequency=1000:duration=1 -c:a pcm_s16le ci_tmp/in/test_input.wav
          python any_to_any.py -i ci_tmp/in/test_input.wav -f mp3 -o ci_tmp/out
          test -f ci_tmp/out/test_input.mp3
          test -s ci_tmp/out/test_input.mp3

      - name: Integration conversion test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci_tmp/in | Out-Null
          New-Item -ItemType Directory -Force -Path ci_tmp/out | Out-Null
          ffmpeg -y -f lavfi -i sine=frequency=1000:duration=1 -c:a pcm_s16le ci_tmp/in/test_input.wav
          python any_to_any.py -i ci_tmp/in/test_input.wav -f mp3 -o ci_tmp/out
          $outPath = "ci_tmp/out/test_input.mp3"
          if (-not (Test-Path $outPath)) { throw "Missing converted file: $outPath" }
          $item = Get-Item $outPath
          if ($item.Length -le 0) { throw "Converted file is empty: $outPath" }

      - name: Smoke test executable (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x "${{ matrix.artifact_path }}"
          "${{ matrix.artifact_path }}" --version

      - name: Smoke test executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "${{ matrix.artifact_path }}" --version

      - name: Validate artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          test -f "${{ matrix.artifact_path }}"
          test -s "${{ matrix.artifact_path }}"
          ls -lh "${{ matrix.artifact_path }}"
          sha256sum "${{ matrix.artifact_path }}"

      - name: Validate artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $path = "${{ matrix.artifact_path }}"
          if (-not (Test-Path $path)) { throw "Missing artifact: $path" }
          $item = Get-Item $path
          if ($item.Length -le 0) { throw "Artifact is empty: $path" }
          $item | Format-List Name,Length,LastWriteTime
          Get-FileHash $path -Algorithm SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_upload_path }}
          retention-days: 30
